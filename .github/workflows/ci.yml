name: CI/CD → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CARGO_TERM_COLOR: always

jobs:
  # ── Build static musl binary ──────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary (musl)
        run: cargo build --release --target x86_64-unknown-linux-musl
        env:
          GIT_SHA: ${{ github.sha }}
          SQLX_OFFLINE: "true"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: flashcards-musl
          path: target/x86_64-unknown-linux-musl/release/flashcards
          retention-days: 1

  # ── Docker build & push to GHCR ──────────────────────────────────────────────
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: flashcards-musl
          path: target/x86_64-unknown-linux-musl/release/

      - name: Make binary executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/flashcards

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render ──────────────────────────────────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── Wait for new version to be live ──────────────────────────────────────────
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for new version to be live on Render
        env:
          SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          SERVICE_URL="${SERVICE_URL%/}"
          echo "Waiting for $SERVICE_URL/version to report commit ${EXPECTED_SHA}..."
          MAX_RETRIES=30
          SLEEP_SECONDS=20
          for i in $(seq 1 $MAX_RETRIES); do
            DEPLOYED=$(curl -s --max-time 10 "$SERVICE_URL/version" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4 || echo "")
            echo "Attempt $i/$MAX_RETRIES – deployed: ${DEPLOYED:-<no response>}"
            if [ "$DEPLOYED" = "$EXPECTED_SHA" ]; then
              echo "New version is live!"
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done
          echo "Timed out after $((MAX_RETRIES * SLEEP_SECONDS))s – expected $EXPECTED_SHA"
          exit 1
