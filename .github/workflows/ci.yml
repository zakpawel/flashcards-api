name: CI/CD → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build native binary ───────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM 21
        uses: actions/setup-java@v4
        with:
          distribution: graalvm
          java-version: "21"

      - name: Cache sbt / ivy / coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.ivy2/cache
            ~/.sbt
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/build.sbt', 'project/**/*.sbt', 'project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Install sbt
        run: |
          curl -fL "https://github.com/sbt/sbt/releases/download/v1.10.1/sbt-1.10.1.tgz" | tar xz -C "$HOME"
          echo "$HOME/sbt/bin" >> $GITHUB_PATH

      - name: Build native binary
        run: sbt GraalVMNativeImage/packageBin
        env:
          GIT_SHA: ${{ github.sha }}

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: flashcards-native
          path: target/native-image/flashcards
          retention-days: 1

  # ── Docker build & push to GHCR ──────────────────────────────────────────────
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download native binary
        uses: actions/download-artifact@v4
        with:
          name: flashcards-native
          path: target/native-image/

      - name: Make binary executable
        run: chmod +x target/native-image/flashcards

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render ──────────────────────────────────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── Wait for new version to be live ──────────────────────────────────────────
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for new version to be live on Render
        env:
          SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for $SERVICE_URL/version to report commit ${EXPECTED_SHA}..."
          MAX_RETRIES=30
          SLEEP_SECONDS=20
          for i in $(seq 1 $MAX_RETRIES); do
            DEPLOYED=$(curl -s --max-time 10 "$SERVICE_URL/version" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4 || echo "")
            echo "Attempt $i/$MAX_RETRIES – deployed: ${DEPLOYED:-<no response>}"
            if [ "$DEPLOYED" = "$EXPECTED_SHA" ]; then
              echo "New version is live!"
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done
          echo "Timed out after $((MAX_RETRIES * SLEEP_SECONDS))s – expected $EXPECTED_SHA"
          exit 1
