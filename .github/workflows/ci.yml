name: CI/CD → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & Test ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: sbt

      - name: Install sbt
        run: |
          curl -fL "https://github.com/sbt/sbt/releases/download/v1.10.1/sbt-1.10.1.tgz" | tar xz -C "$HOME"
          echo "$HOME/sbt/bin" >> $GITHUB_PATH

      - name: Compile & assemble fat-jar
        run: sbt assembly

  # ── Docker build & push to GHCR ──────────────────────────────────────────────
  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Deploy to Render ──────────────────────────────────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ── Wait for Render to be healthy ─────────────────────────────────────────────
  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Wait for Render service to be healthy
        env:
          SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          echo "Waiting for $SERVICE_URL to respond with HTTP 200..."
          MAX_RETRIES=30
          SLEEP_SECONDS=20
          for i in $(seq 1 $MAX_RETRIES); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SERVICE_URL" || echo "000")
            echo "Attempt $i/$MAX_RETRIES – HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is healthy!"
              exit 0
            fi
            sleep $SLEEP_SECONDS
          done
          echo "Service did not become healthy after $((MAX_RETRIES * SLEEP_SECONDS))s"
          exit 1
